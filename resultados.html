<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #c8a96e;
    --accent2: #7c6af0;
    --text: #e8e6f0;
    --text2: #9997b0;
    --correct: #4caf88;
    --correct-bg: rgba(76,175,136,0.12);
    --correct-border: rgba(76,175,136,0.3);
    --wrong: #e05c6a;
    --wrong-bg: rgba(224,92,106,0.10);
    --wrong-border: rgba(224,92,106,0.25);
    --neutral: rgba(255,255,255,0.04);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,106,240,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrap { width: 100%; max-width: 640px; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    color: var(--accent);
    margin-bottom: 6px;
  }
  .header p { color: var(--text2); font-size: 0.9rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 14px;
  }

  /* ── CLOSED ── */
  .closed-icon { font-size: 3rem; text-align: center; margin-bottom: 16px; }
  .closed-msg  { text-align: center; }
  .closed-msg h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  .closed-msg p { color: var(--text2); font-size: 0.9rem; line-height: 1.6; }

  /* ── DNI FORM ── */
  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent2); }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:hover { background: #d9bc85; transform: translateY(-1px); }

  /* ── RESULTS ── */
  .score-header {
    text-align: center;
    padding: 28px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .student-name { font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; }
  .exam-name    { color: var(--text2); font-size: 0.85rem; margin-bottom: 16px; }
  .score-badge  {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #111;
    font-weight: 700;
    font-size: 1.8rem;
    padding: 12px 32px;
    border-radius: 40px;
    margin-bottom: 8px;
  }
  .score-sub { color: var(--text2); font-size: 0.82rem; }

  /* ── DESGLOSE DE NOTA ── */
  .desglose-wrap {
    margin-top: 16px;
    text-align: left;
  }
  .desglose-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: block;
    margin: 0 auto;
  }
  .desglose-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .desglose-content {
    display: none;
    margin-top: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .desglose-content.open { display: block; }
  .desglose-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .desglose-table th {
    background: rgba(255,255,255,0.04);
    padding: 9px 14px;
    text-align: left;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .desglose-table td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .desglose-table tr:last-child td { border-bottom: none; }
  .desglose-table .pts-cell { font-family: 'DM Mono', monospace; text-align: right; }
  .desglose-table .pts-cell.full  { color: var(--correct); font-weight: 600; }
  .desglose-table .pts-cell.partial { color: var(--warn); font-weight: 600; }
  .desglose-table .pts-cell.zero { color: var(--wrong); }
  .desglose-table tr.total-row td { 
    background: rgba(255,255,255,0.04); 
    font-weight: 600; 
    border-top: 2px solid var(--border);
  }
  .desglose-formula {
    padding: 12px 14px;
    font-size: 0.82rem;
    color: var(--text2);
    border-top: 1px solid var(--border);
    background: rgba(124,106,240,0.05);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }
  .desglose-formula strong { color: var(--accent); font-size: 1rem; }

  .q-block { margin-bottom: 14px; }
  .q-block .card { padding: 22px 24px; }
  .q-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .q-label.correct  { color: var(--correct); }
  .q-label.wrong    { color: var(--wrong); }
  .q-label.partial  { color: var(--warn); }
  .q-label .pts    { float: right; font-weight: 600; }

  .q-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    line-height: 1.5;
    margin-bottom: 16px;
  }

  .op {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 0.9rem;
    border: 1px solid transparent;
  }
  /* ✅ Eligió y era correcta */
  .op.hit     { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct); font-weight: 600; }
  /* ○ Era correcta pero no la eligió */
  .op.missed  { background: rgba(76,175,136,0.04); border: 1.5px dashed rgba(76,175,136,0.35); color: var(--correct); }
  /* ❌ La eligió pero era incorrecta */
  .op.mistake { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong); font-weight: 600; }
  /* · No la eligió y era incorrecta — invisible, no confunde */
  .op.ignored { color: var(--text2); opacity: 0.35; }
  .op-icon    { flex-shrink: 0; width: 22px; font-size: 1rem; }
  .op-text    { flex: 1; line-height: 1.4; }
  /* Etiqueta de dos líneas: qué hizo el alumno + veredicto */
  .op-tag-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; margin-top: 1px; }
  .op-tag      { font-size: 0.7rem; font-weight: 600; white-space: nowrap; padding: 2px 8px; border-radius: 10px; }
  .tag-elegiste   { background: rgba(124,106,240,0.18); color: #a89cf0; }
  .tag-correcto   { background: rgba(76,175,136,0.2);   color: var(--correct); }
  .tag-incorrecto { background: rgba(224,92,106,0.18);  color: var(--wrong); }
  .tag-faltó      { background: rgba(76,175,136,0.1);   color: var(--correct); }
  /* Mensaje resumen debajo del enunciado */
  .q-summary {
    font-size: 0.82rem;
    padding: 8px 12px;
    border-radius: 7px;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .q-summary.ok      { background: rgba(76,175,136,0.1);  color: var(--correct); }
  .q-summary.partial { background: rgba(200,169,110,0.12); color: #b8860b; }
  .q-summary.bad     { background: var(--wrong-bg); color: var(--wrong); }

  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 30px;
    font-size: 0.85rem; opacity: 0; transition: all 0.3s; z-index: 99;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) { .card { padding: 20px 16px; } }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1 id="page-title">Resultados</h1>
    <p id="page-subtitle"></p>
  </div>

  <!-- CERRADO -->
  <div id="view-closed" class="card" style="display:none">
    <div class="closed-icon">🔒</div>
    <div class="closed-msg">
      <h2>Resultados no disponibles</h2>
      <p>El profesor aún no habilitó la visualización de resultados.<br>Consulte cuando le sea indicado.</p>
    </div>
  </div>

  <!-- FORMULARIO DNI -->
  <div id="view-form" class="card" style="display:none">
    <div class="field">
      <label>Ingrese su DNI para ver sus resultados</label>
      <input type="text" id="inp-dni" placeholder="Ej: 38123456" inputmode="numeric" maxlength="8">
    </div>
    <button class="btn btn-primary" onclick="buscarResultados()">Ver mis resultados →</button>
  </div>

  <!-- RESULTADOS -->
  <div id="view-results" style="display:none">
    <div class="score-header">
      <div class="student-name" id="res-nombre"></div>
      <div class="exam-name"    id="res-examen"></div>
      <div class="score-badge"  id="res-score"></div>
      <div class="score-sub"    id="res-sub"></div>
      <div class="desglose-wrap">
        <button class="desglose-toggle" onclick="toggleDesglose()">▶ ¿Cómo se calculó mi nota?</button>
        <div class="desglose-content" id="desglose-content">
          <table class="desglose-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Pregunta</th>
                <th>Tipo</th>
                <th style="text-align:right">Obtenido</th>
                <th style="text-align:right">Máximo</th>
              </tr>
            </thead>
            <tbody id="desglose-tbody"></tbody>
            <tfoot id="desglose-tfoot"></tfoot>
          </table>
          <div class="desglose-formula" id="desglose-formula"></div>
        </div>
      </div>
    </div>
    <div id="res-questions"></div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);max-width:200px;margin:0 auto" onclick="resetForm()">← Consultar otro DNI</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
function init() {
  if (typeof EXAM_CONFIG === 'undefined') {
    document.getElementById('page-title').textContent = 'Error';
    document.getElementById('page-subtitle').textContent = 'No se pudo cargar la configuración del examen.';
    return;
  }

  document.getElementById('page-title').textContent = 'Resultados';
  document.getElementById('page-subtitle').textContent = EXAM_CONFIG.titulo || '';

  if (!EXAM_CONFIG.feedbackHabilitado) {
    document.getElementById('view-closed').style.display = 'block';
  } else {
    document.getElementById('view-form').style.display = 'block';
  }
}

function buscarResultados() {
  const dni = document.getElementById('inp-dni').value.trim();
  if (!dni || !/^\d{7,8}$/.test(dni)) { toast('Ingrese un DNI válido'); return; }

  const url = EXAM_CONFIG.sheetsWebhookUrl;
  if (!url || url === 'URL_DE_TU_GOOGLE_APPS_SCRIPT') { toast('URL de Sheets no configurada'); return; }

  fetch(`${url}?action=getFeedback&dni=${encodeURIComponent(dni)}&examen=${encodeURIComponent(EXAM_CONFIG.titulo || '')}`)
    .then(r => r.json())
    .then(data => {
      if (!data || data.error) { toast(data?.error || 'No se encontraron resultados para ese DNI'); return; }
      mostrarResultados(data);
    })
    .catch(() => toast('Error al conectar. Intente nuevamente.'));
}

function toggleDesglose() {
  const el = document.getElementById('desglose-content');
  const btn = document.querySelector('.desglose-toggle');
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? '▼ ¿Cómo se calculó mi nota?' : '▶ ¿Cómo se calculó mi nota?';
}

function mostrarResultados(data) {
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-results').style.display = 'block';

  document.getElementById('res-nombre').textContent = data.nombre;
  document.getElementById('res-examen').textContent = data.examen;
  document.getElementById('res-score').textContent  = `${data.puntajeTotal} / ${data.puntajeMaximo} pts`;
  document.getElementById('res-sub').textContent    = `Entregado el ${data.fecha}`;

  const detalle = typeof data.detalleJSON === 'string' ? JSON.parse(data.detalleJSON) : data.detalleJSON;

  // ── Poblar tabla de desglose ──
  const tbody = document.getElementById('desglose-tbody');
  const tfoot = document.getElementById('desglose-tfoot');
  tbody.innerHTML = '';
  let totalRaw = 0, maxRaw = 0;
  Object.entries(detalle).forEach(([qi, r], idx) => {
    const pts    = r.puntaje;
    const max    = r.puntajeMax;
    const isMulti = (typeof EXAM_CONFIG !== 'undefined' && EXAM_CONFIG.preguntas && EXAM_CONFIG.preguntas[parseInt(qi)])
      ? EXAM_CONFIG.preguntas[parseInt(qi)].tipo === 'multiple' : false;
    const tipo   = isMulti ? 'Múltiple' : 'Simple';
    const pctCls = pts === max ? 'full' : pts > 0 ? 'partial' : 'zero';
    // Truncate question text
    const txt = r.pregunta.length > 55 ? r.pregunta.substring(0, 55) + '…' : r.pregunta;
    totalRaw += pts;
    maxRaw   += max;
    tbody.innerHTML += `<tr>
      <td style="color:var(--text2)">${idx+1}</td>
      <td style="color:var(--text)">${esc(txt)}</td>
      <td style="color:var(--text2)">${tipo}</td>
      <td class="pts-cell ${pctCls}">${pts}</td>
      <td class="pts-cell" style="color:var(--text2)">${max}</td>
    </tr>`;
  });
  tfoot.innerHTML = `<tr class="total-row">
    <td colspan="3">Total bruto</td>
    <td class="pts-cell">${Math.round(totalRaw*100)/100}</td>
    <td class="pts-cell" style="color:var(--text2)">${maxRaw}</td>
  </tr>`;
  const notaFinal = maxRaw > 0 ? Math.round((totalRaw/maxRaw)*10*100)/100 : 0;
  document.getElementById('desglose-formula').innerHTML =
    `${Math.round(totalRaw*100)/100} ÷ ${maxRaw} × 10 = <strong>${notaFinal}</strong>`;

  const container = document.getElementById('res-questions');
  container.innerHTML = '';

  Object.entries(detalle).forEach(([qi, r], idx) => {
    const correcta = r.correcta;
    const isMulti = (typeof EXAM_CONFIG !== 'undefined' && EXAM_CONFIG.preguntas && EXAM_CONFIG.preguntas[parseInt(qi)])
      ? EXAM_CONFIG.preguntas[parseInt(qi)].tipo === 'multiple' : false;
    const ptsObt = r.puntaje; // ya viene calculado con puntaje parcial desde examen.html
    let labelClass, labelTxt;
    if (isMulti) {
      if (ptsObt === r.puntajeMax)      { labelClass = 'correct'; labelTxt = '✓ Correcta completa'; }
      else if (ptsObt > 0)              { labelClass = 'partial'; labelTxt = `◑ Parcialmente correcta`; }
      else                              { labelClass = 'wrong';   labelTxt = '✗ Incorrecta'; }
    } else {
      labelClass = correcta ? 'correct' : 'wrong';
      labelTxt   = correcta ? '✓ Correcta' : '✗ Incorrecta';
    }

    // Build options
    const cfgQ = (typeof EXAM_CONFIG !== 'undefined' && EXAM_CONFIG.preguntas)
      ? EXAM_CONFIG.preguntas[parseInt(qi)] : null;

    let opsHtml = '';
    let summaryHtml = '';

    if (cfgQ) {
      const seleccionadas = r.seleccionadas || [];
      const correctasTexto = cfgQ.opciones.filter(o => o.correcta).map(o => o.texto);

      // Construir resumen claro
      const elegidas       = seleccionadas.length;
      const acertadas      = seleccionadas.filter(s => correctasTexto.includes(s)).length;
      const incorrectasMarcadas = seleccionadas.filter(s => !correctasTexto.includes(s)).length;
      const perdidas       = correctasTexto.filter(s => !seleccionadas.includes(s)).length;

      if (elegidas === 0) {
        summaryHtml = `<div class="q-summary bad">No respondió esta pregunta.</div>`;
      } else if (isMulti) {
        if (ptsObt === r.puntajeMax) {
          summaryHtml = `<div class="q-summary ok">✓ Marcó todas las opciones correctas.</div>`;
        } else {
          let msg = [];
          if (acertadas > 0)            msg.push(`${acertadas} opción${acertadas>1?'es':''} correcta${acertadas>1?'s':''} elegida${acertadas>1?'s':''}`);
          if (perdidas > 0)             msg.push(`${perdidas} correcta${perdidas>1?'s':''} sin marcar`);
          if (incorrectasMarcadas > 0)  msg.push(`${incorrectasMarcadas} incorrecta${incorrectasMarcadas>1?'s':''} marcada${incorrectasMarcadas>1?'s':''}`);
          const cls = ptsObt > 0 ? 'partial' : 'bad';
          summaryHtml = `<div class="q-summary ${cls}">${msg.join(' · ')}</div>`;
        }
      } else {
        if (ptsObt > 0) {
          summaryHtml = `<div class="q-summary ok">✓ Respuesta correcta.</div>`;
        } else {
          summaryHtml = `<div class="q-summary bad">✗ Respuesta incorrecta.</div>`;
        }
      }

      cfgQ.opciones.forEach(op => {
        const seleccionada = seleccionadas.includes(op.texto);
        let cls, icon, tagsHtml = '';
        if (op.correcta && seleccionada) {
          cls  = 'hit';
          icon = '✅';
          tagsHtml = `<div class="op-tag-wrap">
            <span class="op-tag tag-elegiste">✔ Vos la marcaste</span>
            <span class="op-tag tag-correcto">Era correcta</span>
          </div>`;
        } else if (op.correcta && !seleccionada) {
          cls  = 'missed';
          icon = '○';
          tagsHtml = `<div class="op-tag-wrap">
            <span class="op-tag tag-faltó">No la marcaste</span>
            <span class="op-tag tag-correcto">Era correcta</span>
          </div>`;
        } else if (!op.correcta && seleccionada) {
          cls  = 'mistake';
          icon = '❌';
          tagsHtml = `<div class="op-tag-wrap">
            <span class="op-tag tag-elegiste">✔ Vos la marcaste</span>
            <span class="op-tag tag-incorrecto">Era incorrecta</span>
          </div>`;
        } else {
          cls  = 'ignored';
          icon = '·';
        }
        opsHtml += `<div class="op ${cls}">
          <span class="op-icon">${icon}</span>
          <span class="op-text">${esc(op.texto)}</span>
          ${tagsHtml}
        </div>`;
      });
    } else {
      (r.seleccionadas || []).forEach(s => {
        opsHtml += `<div class="op hit"><span class="op-icon">✅</span><span class="op-text">${esc(s)}</span></div>`;
      });
    }

    container.innerHTML += `
      <div class="q-block">
        <div class="card">
          <div class="q-label ${labelClass}">
            Pregunta ${idx+1} &nbsp;${labelTxt}
            <span class="pts">${ptsObt} / ${r.puntajeMax} pts</span>
          </div>
          <div class="q-text">${esc(r.pregunta)}</div>
          ${summaryHtml}
          ${opsHtml}
        </div>
      </div>`;
  });
}

function resetForm() {
  document.getElementById('view-results').style.display = 'none';
  document.getElementById('view-form').style.display = 'block';
  document.getElementById('inp-dni').value = '';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.addEventListener('DOMContentLoaded', init);
</script>
<script src="config.js"></script>
</body>
</html>
